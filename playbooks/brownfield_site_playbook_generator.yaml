---
- name: Generate YAML playbook for site configurations from Cisco Catalyst Center
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "credentials.yml"
  tasks:
    - name: Generate the playbook for site hierarchy (area, building, floor) from Cisco Catalyst Center
      cisco.dnac.brownfield_site_playbook_generator:
        dnac_host: "{{ dnac_host }}"
        dnac_username: "{{ dnac_username }}"
        dnac_password: "{{ dnac_password }}"
        dnac_verify: "{{ dnac_verify }}"
        dnac_port: "{{ dnac_port }}"
        dnac_version: "{{ dnac_version }}"
        dnac_debug: "{{ dnac_debug }}"
        dnac_log_level: DEBUG
        dnac_log: true
        state: gathered
        config:
          # ====================================================================================
          # Scenario 1: Generate all site configurations (area, building, floor)
          # ====================================================================================
          - generate_all_configurations: true
          #   file_path: "/tmp/all_site_configurations.yaml"

          # ====================================================================================
          # Scenario 2: Sites - Filter by Site Name
          # Fetches site from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/site_by_name_single.yaml"
          #   component_specific_filters:
          #     components_list: ["area"]
          #     area:
          #       - site_name: "Global/USA"

          # ====================================================================================
          # Scenario 3: Sites - Filter by Site Name (Multiple)
          # Fetches multiple sites from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/site_by_name_multiple.yaml"
          #   component_specific_filters:
          #     components_list: ["area"]
          #     area:
          #       - site_name: "Global/USA"
          #       - site_name: "Global/Europe"

          # ====================================================================================
          # Scenario 4: building - Filter by Building Name (Single)
          # Fetches a single building from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/building_by_name_single.yaml"
          #   component_specific_filters:
          #     components_list: ["building"]
          #     building:
          #       - site_name: "Global/USA/San Jose/Building1"

          # ====================================================================================
          # Scenario 5: building - Filter by Building Name (Multiple)
          # Fetches multiple building from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/building_by_name_multiple.yaml"
          #   component_specific_filters:
          #     components_list: ["building"]
          #     building:
          #       - site_name: "Global/USA/San Jose/Building1"
          #       - site_name: "Global/USA/San Jose/Building2"

          # ====================================================================================
          # Scenario 6: building - Filter by Parent Site
          # Fetches building under a specific parent site
          # ====================================================================================
          # - file_path: "/tmp/building_by_parent_site.yaml"
          #   component_specific_filters:
          #     components_list: ["building"]
          #     building:
          #       - parent_site_name: "Global/USA/San Jose"

          # ====================================================================================
          # Scenario 7: floor - Filter by Floor Name (Single)
          # Fetches a single floor from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/floor_by_name_single.yaml"
          #   component_specific_filters:
          #     components_list: ["floor"]
          #     floor:
          #       - site_name: "Global/USA/San Jose/Building1/Floor1"

          # ====================================================================================
          # Scenario 8: floor - Filter by Floor Name (Multiple)
          # Fetches multiple floor from Cisco Catalyst Center using site_name as filter
          # ====================================================================================
          # - file_path: "/tmp/floor_by_name_multiple.yaml"
          #   component_specific_filters:
          #     components_list: ["floor"]
          #     floor:
          #       - site_name: "Global/USA/San Jose/Building1/Floor1"
          #       - site_name: "Global/USA/San Jose/Building1/Floor2"

          # ====================================================================================
          # Scenario 9: floor - Filter by Building
          # Fetches all floor within a specific building
          # ====================================================================================
          # - file_path: "/tmp/floor_by_building.yaml"
          #   component_specific_filters:
          #     components_list: ["floor"]
          #     floor:
          #       - parent_site_name: "Global/USA/San Jose/Building1"

          # ====================================================================================
          # Scenario 10: floor - Filter by RF Model
          # Fetches floor with specific RF model type
          # ====================================================================================
          # - file_path: "/tmp/floor_by_rf_model.yaml"
          #   component_specific_filters:
          #     components_list: ["floor"]
          #     floor:
          #       - rf_model: "Cubes And Walled Offices"

          # ====================================================================================
          # Scenario 11: Multiple Site Types - Fetch area and building
          # Fetches multiple site component types simultaneously
          # ====================================================================================
          # - file_path: "/tmp/area_and_building.yaml"
          #   component_specific_filters:
          #     components_list: ["area", "building"]
          #     area:
          #       - site_name: "Global/USA"
          #     building:
          #       - site_name: "Global/USA/San Jose/Building1"

          # ====================================================================================
          # Scenario 12: Multiple Site Types - Fetch building and floor
          # Fetches building and their floor with specific filters
          # ====================================================================================
          # - file_path: "/tmp/building_and_floor.yaml"
          #   component_specific_filters:
          #     components_list: ["building", "floor"]
          #     building:
          #       - parent_site_name: "Global/USA/San Jose"
          #     floor:
          #       - parent_site_name: "Global/USA/San Jose/Building1"

          # ====================================================================================
          # Scenario 13: All Site Components with Different Filters
          # Demonstrates fetching all site component types with varied filter combinations
          # ====================================================================================
          # - file_path: "/tmp/all_site_components_custom_filters.yaml"
          # - component_specific_filters:
          #     components_list: ["area", "building", "floor"]
          #     area:
          #       - site_name: "USA"
          #     building:
          #       - parent_site_name: "Global/chennai"
          #     floor:
          #      # - rf_model: "Cubes And Walled Offices"
          #       - parent_site_name: "Global/USA/San Francisco"

          # ====================================================================================
          # Scenario 14: Fetch All without Filters presented in components_list
          # Tests behavior when components_list is specified but no filter criteria provided
          # ====================================================================================
          # - file_path: "/tmp/site_empty_filter.yaml"
          #   component_specific_filters:
          #     components_list: ["area"]

          # ====================================================================================
          # Scenario 15: No File Path - Default File Generation
          # Tests default file name generation when file_path is not provided
          # Default format: site_workflow_manager_playbook_<timestamp>.yml
          # ====================================================================================
          # - component_specific_filters:
          #     components_list: ["building"]
          #     building:
          #       - site_name: "Global/USA/San Jose/Building1"

          # ====================================================================================
          # Scenario 16: Generate building-only config in current working directory
          # Default format: "<module_name>_playbook_<YYYY-MM-DD_HH-MM-SS>.yml"
          # For example, "<module_name>_playbook_2026-01-24_12-33-20.yml".
          # ====================================================================================
          # - component_specific_filters:
          #     components_list: ["building","area","floor"]

      register: result

      tags:
        - brownfield_site_generator_testing
